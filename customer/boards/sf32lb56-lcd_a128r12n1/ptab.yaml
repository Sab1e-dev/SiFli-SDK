# ptab v3 - Partition Table
# Board: sf32lb56-lcd_a128r12n1
# Chip: SF32LB56X

version: 3
chip: SF32LB56X

# NOTE:
# - `memory` only describes external storage devices.
# - Internal SiP PSRAM/Flash is derived from SiliconSchema.
memory:
  - mpi: mpi3
    type: nand
    size: 134217728 # 128MB

partitions:

  - name: calibration
    type: data
    subtype: calibration
    region: mpi5
    offset: 0x8000
    size: 8KB

  - name: hcpu_flash_code
    type: app
    subtype: factory
    region: mpi3
    offset: 0x000000
    size: 0x00200000
    exec:
      region: mpi1
      offset: 0
    core: HCPU
    attrs:
      PSRAM_BL_MODE: 3
      PSRAM_BL_SIZE: 8
      PSRAM_BL_MPI: 1

  - name: dfu_flash_code
    type: app
    subtype: dfu
    region: mpi3
    offset: 0x00200000
    size: 0x00080000
    exec:
      region: mpi1
      offset: 0
    core: HCPU

  - name: dfu_info_region
    type: data
    subtype: raw
    region: mpi3
    offset: 0x00280000
    size: 0x00020000

  - name: dfu_download_region
    type: data
    subtype: raw
    region: mpi3
    offset: 0x002A0000
    size: 0x00360000

  - name: fs_region
    type: data
    subtype: filesystem
    region: mpi3
    offset: 0x00600000
    size: 0x01C00000

  - name: dfu
    type: data
    subtype: flashdb_kv
    region: mpi3
    offset: 0x02200000
    size: 16KB

  - name: ble
    type: data
    subtype: flashdb_kv
    region: mpi3
    offset: 0x02204000
    size: 16KB

