# ptab v3 - Partition Table
# Board: sf32lb58-lcd_n16r64n4
# Chip: SF32LB58X

version: 3
chip: SF32LB586VDD36

# NOTE:
# - `memory` only describes external storage devices.
# - Internal SiP PSRAM/Flash is derived from SiliconSchema + board Kconfig.
memory:
  - mpi: mpi4
    type: nor
    size: 16MB

partitions:
  - name: psram_data
    type: data
    subtype: ram
    region: psram1
    offset: 0x00200000
    size: 0x01E00000
  - name: psram_data2
    type: data
    subtype: ram
    region: psram2
    offset: 0x00000000
    size: 0x02000000
  - name: hcpu_flash_code
    type: app
    subtype: factory
    region: mpi4
    offset: 0x00000000
    size: 0x00200000
    core: HCPU
    exec:
      region: psram
      offset: 0x00000000

  - name: dfu
    type: data
    subtype: flashdb_kv
    region: mpi4
    offset: 0x00400000
    size: 0x00004000

  - name: ble
    type: data
    subtype: flashdb_kv
    region: mpi4
    offset: 0x00404000
    size: 0x00004000

  - name: dfu_info_region
    type: data
    subtype: raw
    region: mpi4
    offset: 0x00500000
    size: 0x00020000
    aliases:
      - DFU_INFO_REGION

  - name: dfu_flash_code
    type: app
    subtype: dfu
    region: mpi4
    offset: 0x00600000
    size: 0x00080000
    core: HCPU
    aliases:
      - DFU_FLASH_CODE
    exec:
      region: psram
      offset: 0x00000000

  - name: dfu_download_region
    type: data
    subtype: raw
    region: mpi4
    offset: 0x00800000
    size: 0x00200000
    aliases:
      - DFU_DOWNLOAD_REGION

  - name: fs_region
    type: data
    subtype: filesystem
    region: mpi4
    offset: 0x00A00000
    size: 0x00300000
    aliases:
      - FLASH_PART2

  - name: fs_ex_region
    type: data
    subtype: raw
    region: mpi4
    offset: 0x00D00000
    size: 0x00100000
    aliases:
      - FLASH_PART12
      - FS_EX

  - name: acpu
    type: app
    subtype: factory
    region: mpi4
    offset: 0x00E00000
    size: 0x0007C000
    core: ACPU
    aliases:
      - ACPU_CODE_LOAD_REGION1
    exec:
      region: hpsys_ram
      offset: 0x00200000  # must be put in this place

  - name: acpu_cmd_buf
    type: data
    subtype: raw
    region: hpsys_ram
    offset: 0x0027C000
    size: 0x00000200
    core: ACPU
