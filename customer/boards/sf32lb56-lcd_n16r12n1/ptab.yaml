# ptab v3 - Partition Table
# Board: sf32lb56-lcd_n16r12n1
# Chip: SF32LB56X

version: 3
chip: SF32LB56X

# NOTE:
# - `memory` only describes external storage devices.
# - Internal SiP PSRAM/Flash is derived from SiliconSchema.
memory:
  - mpi: mpi3
    type: nor
    size: 16777216 # 16MB

partitions:

  - name: calibration
    type: data
    subtype: calibration
    region: mpi5
    offset: 0x8000
    size: 8KB

  - name: hcpu_flash_code
    type: app
    subtype: factory
    region: mpi3
    offset: 0x000000
    size: 0x00200000
    core: HCPU

  - name: dfu_flash_code
    type: app
    subtype: dfu
    region: mpi3
    offset: 0x00220000
    size: 0x00060000
    core: HCPU

  - name: dfu_download_region
    type: data
    subtype: raw
    region: mpi3
    offset: 0x00280000
    size: 0x00120000

  - name: fs_region
    type: data
    subtype: filesystem
    region: mpi3
    offset: 0x003A0000
    size: 0x00260000

  - name: dfu
    type: data
    subtype: flashdb_kv
    region: mpi3
    offset: 0x00600000
    size: 16KB

  - name: ble
    type: data
    subtype: flashdb_kv
    region: mpi3
    offset: 0x00604000
    size: 16KB

